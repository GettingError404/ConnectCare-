replicaCount: 2

image:
  repository: ghcr.io/connectedcare/backend
  tag: latest
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: connectedcare.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

env:
  ENV: production
  ALGORITHM: HS256
  ACCESS_TOKEN_EXPIRE_MINUTES: "60"
  REFRESH_TOKEN_EXPIRE_DAYS: "30"
  LOGIN_RATE_LIMIT_ATTEMPTS: "8"
  LOGIN_RATE_LIMIT_WINDOW_SECONDS: "60"
  LOGIN_LOCKOUT_SECONDS: "300"
  DATABASE_POOL_SIZE: "10"
  DATABASE_MAX_OVERFLOW: "20"
  DATABASE_POOL_RECYCLE_SECONDS: "1800"
  DATABASE_POOL_TIMEOUT_SECONDS: "30"
  CORS_ALLOW_ORIGINS: "https://app.connectedcare.example.com"
  TRUSTED_HOSTS: "connectedcare.example.com,api.connectedcare.example.com"
  MAX_REQUEST_BODY_BYTES: "1048576"
  OTEL_SERVICE_NAME: "connectedcare-backend"
  OTEL_EXPORTER_OTLP_ENDPOINT: ""
  OTEL_TRACES_SAMPLE_RATIO: "0.0"

secretName: connectedcare-secrets

serviceMonitor:
  enabled: false
  interval: 30s
