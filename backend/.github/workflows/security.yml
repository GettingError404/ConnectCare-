name: Security Scans

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  pip-audit:
    name: Pip Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
      - name: Install pip-audit and detect-secrets
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit detect-secrets
      - name: Run pip-audit
        run: |
          pip-audit --progress=off
      - name: Run detect-secrets
        run: |
          detect-secrets scan --all-files > .secrets.baseline || true
          echo 'detect-secrets scan complete'
