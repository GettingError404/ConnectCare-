name: Performance Safety Checks

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  perf-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: App import + OpenAPI timing
        env:
          OPENAPI_MAX_MS: 1500
          IMPORT_MAX_MS: 2000
        run: |
          python - <<'PY'
import time, sys
from importlib import import_module

start = time.perf_counter()
app_mod = import_module('app.main')
imp_t = (time.perf_counter() - start) * 1000
print(f'import_ms={imp_t:.1f}')
if imp_t > float($OPENAPI_MAX_MS):
    print('Import time exceeded threshold')
    sys.exit(2)

start2 = time.perf_counter()
spec = app_mod.app.openapi()
openapi_t = (time.perf_counter() - start2) * 1000
print(f'openapi_ms={openapi_t:.1f}')
if openapi_t > float($OPENAPI_MAX_MS):
    print('OpenAPI generation exceeded threshold')
    sys.exit(3)
print('performance checks passed')
PY
