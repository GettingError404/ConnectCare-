name: Integration Tests (Postgres + Redis)

on:
  workflow_dispatch:

jobs:
  integration:
    name: Integration (DB + Redis)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: connectedcare_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
      - name: Install dependencies
        env:
          PIP_NO_CACHE_DIR: off
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Wait for Postgres
        env:
          DATABASE_URL: postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/connectedcare_test
        run: |
          python - <<'PY'
import time
import sys
from sqlalchemy import create_engine
url='postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/connectedcare_test'
for i in range(30):
    try:
        eng = create_engine(url)
        conn = eng.connect()
        conn.close()
        print('postgres available')
        sys.exit(0)
    except Exception as e:
        print('waiting for postgres...', e)
        time.sleep(2)
print('postgres did not become available')
sys.exit(1)
PY

      - name: Set DATABASE_URL for tests
        run: echo "DATABASE_URL=postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/connectedcare_test" >> $GITHUB_ENV

      - name: Run alembic upgrade head
        run: alembic upgrade head

      - name: Run migration downgrade/upgrade validation
        run: |
          alembic downgrade base
          alembic upgrade head

      - name: Run full test suite
        run: pytest -q
