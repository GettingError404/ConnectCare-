services:
  postgres-db:
    image: timescale/timescaledb:latest-pg15
    container_name: postgres-db
    command: ["postgres", "-c", "shared_preload_libraries=timescaledb"]
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: connectedcare
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d connectedcare"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  backend:
    build: .
    container_name: fastapi-backend
    depends_on:
      postgres-db:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres-db:5432/connectedcare
    command: ["sh", "-c", "alembic upgrade head && python -m uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    volumes:
      - .:/app
    restart: always

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  worker:
    build: .
    container_name: celery-worker
    depends_on:
      redis:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - .:/app
    command: ["sh", "-c", "celery -A app.core.celery_app.celery_app worker --loglevel=info --concurrency=1"]
    restart: always

  flower:
    build: .
    container_name: flower
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "5555:5555"
    command: ["sh", "-c", "celery -A app.core.celery_app.celery_app flower --port=5555"]
    volumes:
      - .:/app
    restart: always

volumes:
  postgres_data: